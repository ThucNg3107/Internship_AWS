<svg xmlns="http://www.w3.org/2000/svg" width="240" height="520" viewBox="0 0 240 520" font-family="Arial, Helvetica, sans-serif" font-size="11.5">
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0,0 6,3 0,6" fill="#666"/>
    </marker>
  </defs>

  <!-- ===== Node 1: IAM User / Assumed Role (purple box) ===== -->
  <rect x="46" y="8" width="148" height="26" rx="2" ry="2"
        fill="#ddddf5" stroke="#8888cc" stroke-width="1.1"/>
  <text x="120" y="25" text-anchor="middle" fill="#333" font-size="11">IAM User / Assumed Role</text>

  <!-- Arrow down -->
  <line x1="120" y1="34" x2="120" y2="53" stroke="#666" stroke-width="1.1" marker-end="url(#arr)"/>

  <!-- Label: S3 API Call -->
  <text x="120" y="58" text-anchor="middle" fill="#555" font-size="11">S3 API Call</text>

  <!-- Arrow down -->
  <line x1="120" y1="63" x2="120" y2="82" stroke="#666" stroke-width="1.1" marker-end="url(#arr)"/>

  <!-- ===== Node 2: Amazon S3 (box) ===== -->
  <rect x="68" y="83" width="104" height="26" rx="2" ry="2"
        fill="#ddddf5" stroke="#8888cc" stroke-width="1.1"/>
  <text x="120" y="100" text-anchor="middle" fill="#333" font-size="11">Amazon S3</text>

  <!-- Arrow down -->
  <line x1="120" y1="109" x2="120" y2="128" stroke="#666" stroke-width="1.1" marker-end="url(#arr)"/>

  <!-- Label: Data Event Logs -->
  <text x="120" y="142" text-anchor="middle" fill="#555" font-size="11">Data Event Logs</text>

  <!-- Arrow down -->
  <line x1="120" y1="147" x2="120" y2="166" stroke="#666" stroke-width="1.1" marker-end="url(#arr)"/>

  <!-- ===== Node 3: AWS CloudTrail (box) ===== -->
  <rect x="65" y="167" width="110" height="26" rx="2" ry="2"
        fill="#ddddf5" stroke="#8888cc" stroke-width="1.1"/>
  <text x="120" y="184" text-anchor="middle" fill="#333" font-size="11">AWS CloudTrail</text>

  <!-- Arrow down -->
  <line x1="120" y1="193" x2="120" y2="212" stroke="#666" stroke-width="1.1" marker-end="url(#arr)"/>

  <!-- Label: Deliver .json.gz -->
  <text x="120" y="226" text-anchor="middle" fill="#555" font-size="11">Deliver .json.gz</text>

  <!-- Arrow down -->
  <line x1="120" y1="231" x2="120" y2="250" stroke="#666" stroke-width="1.1" marker-end="url(#arr)"/>

  <!-- ===== Node 4: Central S3 Bucket (box) ===== -->
  <rect x="58" y="251" width="124" height="26" rx="2" ry="2"
        fill="#ddddf5" stroke="#8888cc" stroke-width="1.1"/>
  <text x="120" y="268" text-anchor="middle" fill="#333" font-size="11">Central S3 Bucket</text>

  <!-- Arrow down -->
  <line x1="120" y1="277" x2="120" y2="296" stroke="#666" stroke-width="1.1" marker-end="url(#arr)"/>

  <!-- Label: Query via Partition Projection -->
  <text x="120" y="310" text-anchor="middle" fill="#555" font-size="11">Query via Partition Projection</text>

  <!-- Arrow down -->
  <line x1="120" y1="315" x2="120" y2="334" stroke="#666" stroke-width="1.1" marker-end="url(#arr)"/>

  <!-- ===== Node 5: Amazon Athena (box) ===== -->
  <rect x="66" y="335" width="108" height="26" rx="2" ry="2"
        fill="#ddddf5" stroke="#8888cc" stroke-width="1.1"/>
  <text x="120" y="352" text-anchor="middle" fill="#333" font-size="11">Amazon Athena</text>

  <!-- Arrow down -->
  <line x1="120" y1="361" x2="120" y2="380" stroke="#666" stroke-width="1.1" marker-end="url(#arr)"/>

  <!-- Label: Query Results -->
  <text x="120" y="394" text-anchor="middle" fill="#555" font-size="11">Query Results</text>

  <!-- Arrow down -->
  <line x1="120" y1="399" x2="120" y2="418" stroke="#666" stroke-width="1.1" marker-end="url(#arr)"/>

  <!-- ===== Node 6: Security Investigator (box) ===== -->
  <rect x="52" y="419" width="136" height="26" rx="2" ry="2"
        fill="#ddddf5" stroke="#8888cc" stroke-width="1.1"/>
  <text x="120" y="436" text-anchor="middle" fill="#333" font-size="11">Security Investigator</text>

</svg>
